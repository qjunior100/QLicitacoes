[build]
  publish   = "."
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ─────────────────────────────────────────────
# API — roteamento para as Netlify Functions
# /api/licenca → /.netlify/functions/licenca
# /api/admin   → /.netlify/functions/admin
# ─────────────────────────────────────────────
[[redirects]]
  from  = "/api/*"
  to    = "/.netlify/functions/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "connect-src 'self' https://*.supabase.co"

# ─────────────────────────────────────────────
# PÁGINAS DO SITE — sem alteração
# ─────────────────────────────────────────────
[[redirects]]
  from   = "/ativar"
  to     = "/ativar.html"
  status = 200

[[redirects]]
  from   = "/download"
  to     = "https://github.com/qjunior100/QLicitacoes/releases/download/1.5/QLicitacoes_V1.5.zip"
  status = 301

[[redirects]]
  from   = "/afiliados"
  to     = "/afiliados.html"
  status = 200

[[redirects]]
  from   = "/instrucoes"
  to     = "/instrucoes.html"
  status = 200


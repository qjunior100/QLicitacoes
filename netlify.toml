[build]
  publish   = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co https://*.hotmart.com https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com https://stats.g.doubleclick.net https://*.facebook.com https://*.facebook.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://*.facebook.net; img-src 'self' data: https: https://www.facebook.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ─────────────────────────────────────────────
# API — roteamento para as Netlify Functions
# /api/licenca → /.netlify/functions/licenca
# /api/admin   → /.netlify/functions/admin
# ─────────────────────────────────────────────
[[redirects]]
  from  = "/api/*"
  to    = "/.netlify/functions/:splat"
  status = 200
  force  = true

# ─────────────────────────────────────────────
# PÁGINAS DO SITE — sem alteração
# ─────────────────────────────────────────────
[[redirects]]
  from   = "/ativar"
  to     = "/ativar.html"
  status = 200

[[redirects]]
  from   = "/download"
  to     = "https://github.com/qjunior100/QLicitacoes/releases/download/1.5/QLicitacoes_V1.5.zip"
  status = 301

[[redirects]]
  from   = "/afiliados"
  to     = "/afiliados.html"
  status = 200

[[redirects]]
  from   = "/instrucoes"
  to     = "/instrucoes.html"
  status = 200
